<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-primary d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:350px;">
    
    <h3 class="text-center">Register</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{category}}">{{message}}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST" id="registerForm">

        <input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>

        <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

        <input type="password" id="password" name="password" class="form-control mb-2" placeholder="Password" required>

        <div id="strength" class="mb-2 text-muted"></div>

        <button class="btn btn-success w-100">Register</button>

    </form>

    <p class="mt-3 text-center">
        Already have an account? <a href="/">Login</a>
    </p>

</div>

<script>

let password = document.getElementById("password");
let strengthText = document.getElementById("strength");
let form = document.getElementById("registerForm");

password.addEventListener("input", function(){

    let p = password.value;
    let strength = "Weak";

    let hasUpper = /[A-Z]/.test(p);
    let hasNumber = /[0-9]/.test(p);
    let hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(p);

    if(p.length >= 8 && hasUpper && hasNumber && hasSpecial){
        strength = "Strong";
        strengthText.style.color = "green";
    }
    else if(p.length >= 6){
        strength = "Medium";
        strengthText.style.color = "orange";
    }
    else{
        strength = "Weak";
        strengthText.style.color = "red";
    }

    strengthText.innerText = "Strength: " + strength;

});


form.addEventListener("submit", function(e){

    let p = password.value;

    let hasUpper = /[A-Z]/.test(p);
    let hasNumber = /[0-9]/.test(p);
    let hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(p);

    if(!(p.length >= 8 && hasUpper && hasNumber && hasSpecial)){
        e.preventDefault();
        alert("Password must contain:\n- At least 8 characters\n- 1 uppercase letter\n- 1 number\n- 1 special character");
    }

});

</script>

</body>
</html>
